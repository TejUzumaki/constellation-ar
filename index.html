<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Constellation AR - Sky Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-dark: #050608;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --panel-bg: rgba(15, 18, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-text: #f1f2f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--glass-text);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #camera-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }
        #camera-container video, #camera-container canvas {
            width: 100% !important; height: 100% !important; object-fit: cover;
        }
        #ar-ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: none;
        }
        #permission-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #141923 0%, #050608 100%);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        .loader-card {
            background: rgba(255, 255, 255, 0.02); padding: 40px 30px; border-radius: 28px;
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            width: 85%; max-width: 340px; border: 1px solid var(--glass-border);
        }
        h1 {
            font-size: 2.2rem; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px;
        }
        #status-text { font-size: 13px; color: #858e96; margin-bottom: 20px; min-height: 20px; }
        .action-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green)); color: white; border: none; padding: 15px 40px;
            font-size: 15px; font-weight: 700; border-radius: 30px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.25);
        }
        .dashboard-header {
            position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .telemetry-capsule {
            background: var(--panel-bg); border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 20px;
            font-size: 11px; font-weight: 600; font-family: monospace; display: flex; gap: 12px;
        }
        .status-pill {
            background: var(--panel-bg); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
        }
        .pulse-indicator { width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; transition: background-color 0.3s; }
        .tracking-active .pulse-indicator { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
    </style>
</head>
<body>
    <div id="permission-screen">
        <div class="loader-card">
            <h1>Constellation AR</h1>
            <p id="status-text">Initializing Star Engine...</p>
            <button id="start-btn" class="action-btn" style="display: none;">Allow Sky Tracking</button>
        </div>
    </div>

    <div id="camera-container"></div>

    <div id="ar-ui-layer">
        <div class="dashboard-header">
            <div class="telemetry-capsule">
                <div>STARS: <span id="star-count" style="color:var(--accent-green)">0</span></div>
                <div>GPS: <span id="gps-status" style="color:var(--accent-red)">OFF</span></div>
            </div>
            <div class="status-pill" id="orientation-status">
                <span class="pulse-indicator"></span>
                <span id="hud-text">CALIBRATING</span>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let starsGroup; 
        let userLat, userLon;
        let astronomicalData = { stars: [], lines: [], names: [] };

        const permissionScreen = document.getElementById('permission-screen');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const arUiLayer = document.getElementById('ar-ui-layer');

        async function loadData() {
            try {
                statusText.innerText = "Downloading Star Catalogs...";
                const [starsRes, linesRes, namesRes] = await Promise.all([
                    fetch('./data/stars.6.json').then(r => r.json()),
                    fetch('./data/constellations.lines.json').then(r => r.json()),
                    fetch('./data/starnames.json').then(r => r.json())
                ]);
                astronomicalData.stars = starsRes.features;
                astronomicalData.lines = linesRes;
                astronomicalData.names = namesRes;
                statusText.innerText = "Star data loaded successfully!";
                startBtn.style.display = 'block';
            } catch (err) {
                statusText.innerText = "Error loading star data. Check connection.";
                console.error("Data Load Error:", err);
            }
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.zIndex = '2';
            document.getElementById('camera-container').appendChild(renderer.domElement);

            starsGroup = new THREE.Group();
            scene.add(starsGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            const starGeometry = new THREE.SphereGeometry(0.3, 8, 8);
            const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

            let starCount = 0;
            astronomicalData.stars.forEach(feature => {
                const ra = feature.geometry.coordinates[0];
                const dec = feature.geometry.coordinates[1];
                
                const phi = (90 - dec) * Math.PI / 180;
                const theta = ra * Math.PI / 180;
                
                const x = 100 * Math.sin(phi) * Math.cos(theta);
                const y = 100 * Math.cos(phi);
                const z = 100 * Math.sin(phi) * Math.sin(theta);

                const star = new THREE.Mesh(starGeometry, starMaterial.clone());
                star.position.set(x, y, z);
                starsGroup.add(star);
                starCount++;
            });

            document.getElementById('star-count').innerText = starCount;
            
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function handleOrientation(event) {
            if (userLat === undefined) return; 
            starsGroup.rotation.y = THREE.Math.degToRad(event.alpha);
            starsGroup.rotation.x = THREE.Math.degToRad(event.beta);
            starsGroup.rotation.z = THREE.Math.degToRad(event.gamma);

            document.getElementById('orientation-status').classList.add('tracking-active');
            document.getElementById('hud-text').innerText = "TRACKING SKY";
        }

        async function startApp() {
            startBtn.style.display = 'none';
            statusText.innerText = "Requesting GPS Location...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    document.getElementById('gps-status').innerText = "ON";
                    document.getElementById('gps-status').style.color = "var(--accent-green)";
                    statusText.innerText = "Requesting Motion Sensors...";

                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        DeviceOrientationEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                    launchAR();
                                }
                            })
                            .catch(console.error);
                    } else {
                        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                        window.addEventListener('deviceorientation', handleOrientation, true);
                        launchAR();
                    }
                },
                (err) => {
                    statusText.innerText = "GPS Permission Denied. Please enable.";
                },
                { enableHighAccuracy: true }
            );
        }

        function launchAR() {
            permissionScreen.style.display = 'none';
            arUiLayer.style.display = 'block';
            initThreeJS();
        }

        startBtn.addEventListener('click', startApp);
        loadData();
    </script>
</body>
</html>

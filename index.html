<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Constellation AR</title>
    <style>
        :root {
            --bg-dark: #050608;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --panel-bg: rgba(15, 18, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #camera-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: #000; }
        #camera-container video { width: 100% !important; height: 100% !important; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        #camera-container canvas { position: absolute; top: 0; left: 0; z-index: 2; width: 100% !important; height: 100% !important; }
        
        #ar-ui-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; display: none; }
        
        #permission-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #141923 0%, #050608 100%);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        .loader-card {
            background: rgba(255, 255, 255, 0.02); padding: 40px 30px; border-radius: 28px;
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            width: 85%; max-width: 340px; border: 1px solid var(--glass-border);
        }
        h1 { font-size: 2.2rem; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
        #status-text { font-size: 13px; color: #858e96; margin-bottom: 20px; min-height: 20px; }
        .action-btn { background: linear-gradient(135deg, var(--accent-blue), var(--accent-green)); color: white; border: none; padding: 15px 40px; font-size: 15px; font-weight: 700; border-radius: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(46, 204, 113, 0.25); }

        .dashboard-header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .telemetry-capsule { background: var(--panel-bg); border: 1px solid var(--glass-border); padding: 10px 18px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: monospace; display: flex; gap: 12px; backdrop-filter: blur(10px); }
        .status-pill { background: var(--panel-bg); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); }
        .pulse-indicator { width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; transition: background-color 0.3s; }
        .tracking-active .pulse-indicator { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        /* Snapchat Style Scroll Wheel */
        #constellation-wheel {
            position: absolute;
            bottom: 30px; left: 0; width: 100%;
            display: flex; gap: 15px;
            overflow-x: auto; scroll-snap-type: x mandatory;
            padding: 15px 20px; pointer-events: auto;
            scrollbar-width: none;
        }
        #constellation-wheel::-webkit-scrollbar { display: none; }
        .wheel-item {
            scroll-snap-align: center;
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            padding: 12px 24px; border-radius: 15px; white-space: nowrap;
            font-size: 14px; font-weight: 600; color: #ccc;
            backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .wheel-item.active { background: rgba(52, 152, 219, 0.3); border-color: var(--accent-blue); color: #fff; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="permission-screen">
        <div class="loader-card">
            <h1>Constellation AR</h1>
            <p id="status-text">Initializing Star Engine...</p>
            <button id="start-btn" class="action-btn" style="display: none;">Allow AR & Tracking</button>
        </div>
    </div>

    <div id="camera-container"></div>

    <div id="ar-ui-layer">
        <div class="dashboard-header">
            <div class="telemetry-capsule">
                <div>STARS: <span id="star-count" style="color:var(--accent-green)">0</span></div>
                <div>GPS: <span id="gps-status" style="color:var(--accent-red)">OFF</span></div>
            </div>
            <div class="status-pill" id="orientation-status">
                <span class="pulse-indicator"></span>
                <span id="hud-text">CALIBRATING</span>
            </div>
        </div>
        <div id="constellation-wheel"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        let scene, camera, renderer, starsGroup;
        let userLat, userLon;
        let astronomicalData = { stars: [], lines: {}, names: [] };

        const permissionScreen = document.getElementById('permission-screen');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');
        const arUiLayer = document.getElementById('ar-ui-layer');

        async function loadData() {
            try {
                statusText.innerText = "Downloading Star Catalogs...";
                const [starsRes, linesRes, namesRes] = await Promise.all([
                    fetch('data/stars.6.json').then(r => r.json()),
                    fetch('data/constellations.lines.json').then(r => r.json()),
                    fetch('data/starnames.json').then(r => r.json())
                ]);
                astronomicalData.stars = starsRes.features;
                astronomicalData.lines = linesRes;
                astronomicalData.names = namesRes;
                statusText.innerText = "Data loaded. Ready for AR.";
                startBtn.style.display = 'block';
            } catch (err) {
                statusText.innerText = "Data Error: " + err.message;
            }
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('camera-container').appendChild(renderer.domElement);

            starsGroup = new THREE.Group();
            scene.add(starsGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Create a glowing texture for stars instead of 3D spheres
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.4)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            const starTexture = new THREE.CanvasTexture(canvas);

            // Use BufferGeometry for performance
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            
            astronomicalData.stars.forEach(feature => {
                const ra = feature.geometry.coordinates[0];
                const dec = feature.geometry.coordinates[1];
                
                const phi = (90 - dec) * Math.PI / 180;
                const theta = ra * Math.PI / 180;
                
                const x = 100 * Math.sin(phi) * Math.cos(theta);
                const y = 100 * Math.cos(phi);
                const z = 100 * Math.sin(phi) * Math.sin(theta);

                positions.push(x, y, z);
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 1.2,
                map: starTexture,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: false // Keeps stars same pixel size regardless of distance
            });

            const stars = new THREE.Points(geometry, material);
            starsGroup.add(stars);
            document.getElementById('star-count').innerText = astronomicalData.stars.length;

            populateWheel();
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function populateWheel() {
            const wheel = document.getElementById('constellation-wheel');
            wheel.innerHTML = '';
            const constellations = Object.keys(astronomicalData.lines);
            
            constellations.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'wheel-item' + (index === 0 ? ' active' : '');
                item.innerText = name.toUpperCase();
                item.onclick = () => {
                    document.querySelectorAll('.wheel-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                };
                wheel.appendChild(item);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        const eul = new THREE.Euler();
        function handleOrientation(event) {
            if (userLat === undefined) return; 
            const alpha = THREE.Math.degToRad(event.alpha);
            const beta = THREE.Math.degToRad(event.beta);
            const gamma = THREE.Math.degToRad(event.gamma);
            eul.set(beta, alpha, -gamma, 'YXZ');
            starsGroup.quaternion.setFromEuler(eul);

            document.getElementById('orientation-status').classList.add('tracking-active');
            document.getElementById('hud-text').innerText = "TRACKING SKY";
        }

        async function startApp() {
            startBtn.style.display = 'none';
            statusText.innerText = "Requesting Camera Access...";

            try {
                // Request Back Camera
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.muted = true;
                document.getElementById('camera-container').appendChild(video);
                await video.play();
            } catch (err) {
                statusText.innerText = "Camera Access Denied.";
                return;
            }

            statusText.innerText = "Requesting GPS Location...";
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    document.getElementById('gps-status').innerText = "ON";
                    document.getElementById('gps-status').style.color = "var(--accent-green)";
                    statusText.innerText = "Requesting Motion Sensors...";

                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        DeviceOrientationEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                    launchAR();
                                }
                            })
                            .catch(console.error);
                    } else {
                        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                        window.addEventListener('deviceorientation', handleOrientation, true);
                        launchAR();
                    }
                },
                (err) => { statusText.innerText = "GPS Permission Denied."; },
                { enableHighAccuracy: true }
            );
        }

        function launchAR() {
            permissionScreen.style.display = 'none';
            arUiLayer.style.display = 'block';
            initThreeJS();
        }

        startBtn.addEventListener('click', startApp);
        window.onload = () => { if (typeof THREE !== 'undefined' && typeof Astronomy !== 'undefined') loadData(); };
    </script>
</body>
</html>
